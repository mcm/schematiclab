# =============================================================================
# Comprehensive TypeScript CI Pipeline — pnpm + Semgrep
# =============================================================================
# What this covers:
#   • Dependency audit (pnpm audit)
#   • Lockfile integrity check
#   • Linting (ESLint)
#   • Formatting check (Prettier)
#   • Type checking (tsc --noEmit)
#   • Spelling (cspell — advisory)
#   • Markdown linting (markdownlint — advisory)
#   • Unused dependency detection (knip — advisory)
#   • Unit tests (Vitest w/ coverage)
#   • E2E tests (Playwright)
#   • Coverage upload (Codecov)
#   • Build verification
#   • Bundle size tracking (PR comment)
#   • Dependency license compliance (license-checker-rseidelsohn)
#   • Semgrep SAST (community + Trail of Bits rules)
#   • Secret scanning (TruffleHog)
#   • Concurrency control (auto-cancel stale runs)
#
# Secrets to configure:
#   • NPM_TOKEN    — read-only granular token scoped to @spicosolutions
#   • CODECOV_TOKEN — https://codecov.io
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]
  schedule:
    # Weekly full audit run (Sundays at 03:00 UTC)
    - cron: "0 3 * * 0"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_PRIMARY: "22"
  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

jobs:
  # ===========================================================================
  # 1. Dependency Audit
  # ===========================================================================
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_PRIMARY }}
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: pnpm audit (production)
        run: pnpm audit --prod --audit-level high
        continue-on-error: false

      - name: pnpm audit (all — advisory)
        run: pnpm audit --audit-level critical
        continue-on-error: true

  # ===========================================================================
  # 2. Lockfile Integrity
  # ===========================================================================
  lockfile:
    name: Lockfile Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_PRIMARY }}
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Verify lockfile is in sync
        run: pnpm install --frozen-lockfile --ignore-scripts

  # ===========================================================================
  # 3. Quality — Lint, Format, Typecheck (required)
  # ===========================================================================
  quality:
    name: "Quality [${{ matrix.check }}]"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check: [lint, format, typecheck]
        include:
          - check: lint
            cmd: pnpm run lint
          - check: format
            cmd: pnpm exec prettier --check "**/*.{ts,tsx,js,jsx,json,css,md,yml,yaml}"
          - check: typecheck
            cmd: pnpm exec tsc --noEmit
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_PRIMARY }}
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: ${{ matrix.check }}
        run: ${{ matrix.cmd }}

  # ===========================================================================
  # 3b. Quality — Advisory checks (won't block CI)
  # ===========================================================================
  quality-advisory:
    name: "Advisory [${{ matrix.check }}]"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check: [spelling, markdown, knip]
        include:
          - check: spelling
            cmd: pnpm exec cspell "**/*.{ts,tsx,md}" --no-progress --no-must-find-files
          - check: markdown
            cmd: pnpm exec markdownlint-cli2 "**/*.md" "#node_modules"
          - check: knip
            cmd: pnpm exec knip
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_PRIMARY }}
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: ${{ matrix.check }}
        run: ${{ matrix.cmd }}
        continue-on-error: true

  # ===========================================================================
  # 4. Unit Tests (with coverage)
  # ===========================================================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_PRIMARY }}
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm exec vitest run --coverage
        env:
          CI: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info,./coverage/coverage-final.json
          fail_ci_if_error: false
          flags: unittests

  # ===========================================================================
  # 5. Build Verification
  # ===========================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_PRIMARY }}
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Verify build output exists
        run: |
          if [ -d ".next" ]; then
            echo "✅ Build output found"
          else
            echo "❌ .next directory not found"
            exit 1
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next/
          retention-days: 1
          include-hidden-files: true

  # ===========================================================================
  # 6. Bundle Size Tracking (PR comment)
  # ===========================================================================
  size:
    name: Bundle Size
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [build]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: .next/

      - name: Check bundle size
        run: |
          echo "## 📦 Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          SIZE=$(du -sh .next | cut -f1)
          echo "Total .next size: **${SIZE}**" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # 7. License Compliance
  # ===========================================================================
  licenses:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_PRIMARY }}
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Check dependency licenses
        run: |
          pnpm exec license-checker-rseidelsohn --production --onlyAllow \
            "MIT;ISC;BSD-2-Clause;BSD-3-Clause;Apache-2.0;0BSD;CC0-1.0;CC-BY-3.0;CC-BY-4.0;Unlicense;Python-2.0;BlueOak-1.0.0" \
            --excludePrivatePackages \
            --excludePackagesStartingWith '@iamthemcmaster'
        continue-on-error: true

  # ===========================================================================
  # 8. Semgrep SAST
  # ===========================================================================
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config auto \
            --config p/trailofbits \
            --error \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.tessl' \
            --json \
            --output=semgrep-results.json

      - name: Upload Semgrep report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-report
          path: semgrep-results.json
          retention-days: 30

  # ===========================================================================
  # 9. Secret Scanning (TruffleHog)
  # ===========================================================================
  secrets-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  # ===========================================================================
  # 10. Final Gate — all required checks must pass
  # ===========================================================================
  ci-ok:
    name: CI ✅
    if: always()
    needs:
      - audit
      - lockfile
      - quality
      - test
      - build
      - semgrep
      - secrets-scan
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate results
        run: |
          echo "Audit:            ${{ needs.audit.result }}"
          echo "Lockfile:         ${{ needs.lockfile.result }}"
          echo "Quality:          ${{ needs.quality.result }}"
          echo "Unit Tests:       ${{ needs.test.result }}"
          echo "Build:            ${{ needs.build.result }}"
          echo "Semgrep:          ${{ needs.semgrep.result }}"
          echo "Secrets:          ${{ needs.secrets-scan.result }}"

          # Fail if any required job failed
          if [[ "${{ needs.audit.result }}" == "failure" || \
                "${{ needs.lockfile.result }}" == "failure" || \
                "${{ needs.quality.result }}" == "failure" || \
                "${{ needs.test.result }}" == "failure" || \
                "${{ needs.build.result }}" == "failure" || \
                "${{ needs.semgrep.result }}" == "failure" || \
                "${{ needs.secrets-scan.result }}" == "failure" ]]; then
            echo "::error::One or more required CI jobs failed"
            exit 1
          fi

          echo "All required checks passed!"
